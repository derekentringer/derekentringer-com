[package]
name = "NoteSync"
version = "0.1.0"
description = "NoteSync Desktop"
authors = ["Derek Entringer"]
license = ""
repository = ""
edition = "2021"
rust-version = "1.77.2"

[[bin]]
name = "NoteSync"
path = "src/main.rs"

[lib]
name = "app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.5.6", features = [] }

[dependencies]
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
log = "0.4"
tauri = { version = "2.10.3", features = [] }
tauri-plugin-log = "2"
tauri-plugin-sql = { version = "2", features = ["sqlite"] }
keyring = { version = "3", features = ["apple-native", "windows-native", "sync-secret-service"] }
tauri-plugin-fs = { version = "2", features = ["watch"] }
tauri-plugin-dialog = "2"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls"] }
# `hound` is used by the cross-platform audio_capture_shared module, so it must
# be available on every target that includes meeting-mode capture (macOS + Windows).
hound = "3.5"

[target.'cfg(target_os = "macos")'.dependencies]
objc2 = "0.6"
objc2-foundation = { version = "0.3", features = ["NSUserDefaults", "NSString", "NSProcessInfo", "NSArray", "NSValue", "NSUUID"] }
objc2-core-audio = { version = "0.3", default-features = false, features = ["std", "AudioHardware", "objc2", "objc2-foundation"] }
coreaudio-rs = { version = "0.14", features = ["audio_unit", "core_audio"] }
core-foundation = "0.10"
block2 = "0.6"

[target.'cfg(target_os = "windows")'.dependencies]
# cpal provides WASAPI capture (including loopback on the default output device)
# for the Windows meeting-mode audio_capture_win module.
cpal = "0.15"
